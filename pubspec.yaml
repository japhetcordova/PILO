name: pilo
description: "Pilo — AI Meal Decision Engine (Pilandok). Your pocket chef, zero waste."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Camera & Vision
  camera: ^0.10.5+9
  google_mlkit_object_detection: ^0.12.0
  google_mlkit_image_labeling: ^0.11.0

  # AI (MediaPipe for Offline LLM)
  mediapipe_genai: ^0.0.1-dev.2

  # Payments
  in_app_purchase: ^3.1.11

  # UI & Utils
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  intl: ^0.19.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
